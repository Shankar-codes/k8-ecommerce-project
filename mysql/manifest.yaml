apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: mysql
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: mysql
      tier: db
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: mysql
        tier: db
    spec:
      containers:
      - name: mysql
        image: shankarntr/mysql:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 5
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: mysql
    tier: db
  ports:
    - protocol: TCP
      port: 3306 #service Port
      targetPort: 3306 #container Port

