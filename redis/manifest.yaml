apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: redis
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: redis
      tier: db
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: redis
        tier: db
    spec:
      containers:
      - name: redis
        image: shankarntr/redis:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: redis
    tier: db
  ports:
    - protocol: TCP
      port: 6379 #service Port
      targetPort: 6379 #container Port

