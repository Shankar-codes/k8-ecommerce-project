apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
  namespace: ellamma-ecommerce
data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: user
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: user
      tier: backend
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: user
        tier: backend
    spec:
      containers:
      - name: user
        image: shankarntr/user:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: user-config
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---

apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: user
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service Port
      targetPort: 8080 #container Port

