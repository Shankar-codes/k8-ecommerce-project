apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-config
  namespace: ellamma-ecommerce
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: shipping
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: shipping
      tier: backend
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: shipping
        tier: backend
    spec:
      containers:
      - name: shipping
        image: shankarntr/shipping:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: shipping-config
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---

apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: shipping
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service Port
      targetPort: 8080 #container Port

