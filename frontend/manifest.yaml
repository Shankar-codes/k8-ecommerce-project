apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: frontend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: frontend
      tier: backend
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: frontend
        tier: backend
    spec:
      containers:
      - name: frontend
        image: shankarntr/frontend:v1
        imagePullPolicy: Always
        ports:
        - name: liveness-port
          containerPort: 80
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ellamma-ecommerce
spec:
  type: LoadBalancer
  selector:
    project: ecommerce-project
    component: frontend
    tier: backend
  ports:
    - protocol: TCP
      port: 80 #service Port
      targetPort: 80 #container Port

