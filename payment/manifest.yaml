apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: ellamma-ecommerce
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
  
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: payment
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: payment
      tier: backend
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: payment
        tier: backend
    spec:
      containers:
      - name: payment
        image: shankarntr/payment:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: payment-config
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---

apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: payment
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service Port
      targetPort: 8080 #container Port

