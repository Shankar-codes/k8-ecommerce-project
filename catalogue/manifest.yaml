apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: catalogue
      tier: backend
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: catalogue
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: shankarntr/catalogue:v1
        imagePullPolicy: Always
        ports:
        - name: liveness-port
          containerPort: 8080        
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: catalogue
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service Port
      targetPort: 8080 #container Port

