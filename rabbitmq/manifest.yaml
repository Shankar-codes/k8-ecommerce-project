apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: rabbitmq
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: rabbitmq
      tier: db
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: rabbitmq
        tier: db
    spec:
      containers:
      - name: rabbitmq
        image: shankarntr/rabbitmq:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 5
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ellamma-ecommerce
spec:
  selector:
    project: ecommerce-project
    component: rabbitmq
    tier: db
  ports:
    - protocol: TCP
      port: 5672 #service Port
      targetPort: 5672 #container Port

